<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1, maximum-scale=2">
  <meta name="theme-color" content="#0D1B3D">
  <meta name="description" content="巅峰挑战：征服高华阅读理解三座大山 — 五年级高华课堂游戏化练习">
  <title>巅峰挑战：征服高华阅读理解三座大山</title>
  <link rel="stylesheet" href="./assets/css/theme.css">
  <link rel="stylesheet" href="./assets/css/home.css">
</head>
<body class="has-toolbar no-select">
  <div class="bg-stage" aria-hidden="true"></div>

  <main id="home" class="home-stage">

    <!-- 顶部信息条 -->
    <header class="home-top">
      <div class="brand" aria-label="巅峰挑战">
        <span class="b-main">巅峰挑战</span>
        <span class="b-sub">征服高华阅读理解三座大山</span>
        <svg class="b-bolt" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg>
      </div>

      <div class="banner">阅读五年级 · 勇者无畏 · 智者无敌</div>

      <div class="actions">
        <button class="act-btn" id="btn-settings" title="设置" aria-label="设置">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor" aria-hidden="true"><path d="M19.4 13a7.7 7.7 0 000-2l2.1-1.6-2-3.4-2.4 1a7.7 7.7 0 00-1.7-1L15 3h-4l-.4 2a7.7 7.7 0 00-1.7 1l-2.4-1-2 3.4L6.6 11a7.7 7.7 0 000 2l-2.1 1.6 2 3.4 2.4-1a7.7 7.7 0 001.7 1l.4 2h4l.4-2a7.7 7.7 0 001.7-1l2.4 1 2-3.4L19.4 13zM12 15.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z"/></svg>
        </button>
        <button class="act-btn" id="btn-volume" title="声音" aria-label="声音">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor" aria-hidden="true"><path d="M3 10v4h4l5 4V6L7 10H3z"/><path d="M16 8a5 5 0 010 8M19 5a9 9 0 010 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
        <div class="coach" title="花瓶教练">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-3 0-9 1.5-9 5v3h18v-3c0-3.5-6-5-9-5z"/></svg>
        </div>
      </div>
    </header>

    <!-- HP 装饰条 -->
    <div class="hp-row" aria-hidden="true">
      <span class="hp-label">HP</span>
      <div class="hpbar"><div class="fill"></div></div>
      <svg class="hp-bolt" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg>
      <span class="hp-num">850 / 1000</span>
    </div>

    <!-- 主舞台 -->
    <section class="stage-row">
      <div class="mascot" aria-hidden="false">
        <img src="./assets/img/hero.svg" alt="花瓶战士" />
      </div>

      <div class="cards">
        <a class="boss-card" data-no="01" href="./levels/level1.html" id="card-l1">
          <div class="ico">
            <!-- 文字图标：双圆叠 + 文 字 -->
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="12" y="14" width="32" height="40" rx="3"/>
              <path d="M20 24h16M20 32h16M20 40h10"/>
              <circle cx="44" cy="42" r="10" fill="rgba(0,194,255,.22)" stroke="currentColor"/>
              <path d="M40 42h8M44 38v8"/>
            </svg>
          </div>
          <div class="ttl">陷阱魔王</div>
          <div class="sub">第一座山 ｜ 识破伪标题</div>
          <div class="stars" aria-hidden="true"><span></span><span class="dim"></span><span class="dim"></span></div>
          <button class="btn-battle" type="button" tabindex="-1">立即挑战</button>
        </a>

        <a class="boss-card" data-no="02" href="./levels/level2.html" id="card-l2">
          <div class="ico">
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="28" cy="28" r="14"/>
              <path d="M38 38l12 12"/>
              <path d="M22 28h12M28 22v12" stroke-width="2.5"/>
              <ellipse cx="50" cy="20" rx="8" ry="4" opacity=".6"/>
            </svg>
          </div>
          <div class="ttl">迷雾魔王</div>
          <div class="sub">第二座山 ｜ 破译短语真意</div>
          <div class="stars" aria-hidden="true"><span></span><span class="dim"></span><span class="dim"></span></div>
          <button class="btn-battle" type="button" tabindex="-1">立即挑战</button>
        </a>

        <a class="boss-card" data-no="03" href="./levels/level3.html" id="card-l3">
          <div class="ico">
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="20" cy="40" r="6"/>
              <circle cx="44" cy="40" r="6"/>
              <path d="M22 36L48 12M42 36L18 12"/>
            </svg>
          </div>
          <div class="ttl">啰嗦魔王</div>
          <div class="sub">第三座山 ｜ 15 字斩段意</div>
          <div class="stars" aria-hidden="true"><span></span><span class="dim"></span><span class="dim"></span></div>
          <button class="btn-battle" type="button" tabindex="-1">立即挑战</button>
        </a>
      </div>
    </section>

    <!-- 段位徽章槽 -->
    <section class="ranks" aria-label="段位">
      <div class="rank-badge" data-rank="bronze" data-state="locked" id="rank-bronze">
        <div class="hex">
          <svg class="lock" viewBox="0 0 24 24" fill="#FFE873" aria-hidden="true"><path d="M6 10V8a6 6 0 0112 0v2h1v12H5V10zm2 0h8V8a4 4 0 00-8 0z"/></svg>
        </div>
        <div class="meta">
          <div class="name">青铜勇者</div>
          <div class="status">未解锁</div>
          <div class="stars"><span></span><span></span><span></span></div>
        </div>
      </div>

      <div class="rank-badge" data-rank="silver" data-state="locked" id="rank-silver">
        <div class="hex">
          <svg class="lock" viewBox="0 0 24 24" fill="#FFE873" aria-hidden="true"><path d="M6 10V8a6 6 0 0112 0v2h1v12H5V10zm2 0h8V8a4 4 0 00-8 0z"/></svg>
        </div>
        <div class="meta">
          <div class="name">白银智者</div>
          <div class="status">未解锁</div>
          <div class="stars"><span></span><span></span><span></span></div>
        </div>
      </div>

      <div class="rank-badge" data-rank="gold" data-state="locked" id="rank-gold">
        <div class="hex">
          <svg class="lock" viewBox="0 0 24 24" fill="#FFE873" aria-hidden="true"><path d="M6 10V8a6 6 0 0112 0v2h1v12H5V10zm2 0h8V8a4 4 0 00-8 0z"/></svg>
        </div>
        <div class="meta">
          <div class="name">黄金王者</div>
          <div class="status">未解锁</div>
          <div class="stars"><span></span><span></span><span></span></div>
        </div>
      </div>
    </section>

  </main>

  <script src="./assets/js/state.js"></script>
  <script src="./assets/js/audio.js"></script>
  <script src="./assets/js/toolbar.js"></script>
  <script src="./assets/js/content.js"></script>
  <script>
    TeacherToolbar.mount({ homeHref: './index.html' });

    // —— 同步段位徽章 / 关卡星星 / 顶右声音键 ——
    function syncRanks() {
      const s = GameState.get();
      const cleared = ['l1', 'l2', 'l3'].filter(k => s.cleared[k]).length;
      const order = ['bronze', 'silver', 'gold'];
      order.forEach((r, i) => {
        const el = document.getElementById('rank-' + r);
        if (!el) return;
        const unlocked = i < cleared;
        el.setAttribute('data-state', unlocked ? 'unlocked' : 'locked');
        el.querySelector('.status').textContent = unlocked ? '已解锁' : '未解锁';
      });
      // 卡片星
      ['l1','l2','l3'].forEach((k, i) => {
        const card = document.getElementById('card-' + k);
        if (!card) return;
        const stars = card.querySelectorAll('.stars span');
        stars.forEach((sp, j) => sp.classList.toggle('dim', !s.cleared[k] || j > 0));
      });
    }
    syncRanks();
    GameState.onChange(syncRanks);

    // 顶右声音键 = 静音切换（与工具条共用一个状态）
    document.getElementById('btn-volume').addEventListener('click', () => {
      GameState.toggleMuted();
      SFX.select();
    });
    document.getElementById('btn-settings').addEventListener('click', () => {
      SFX.select();
      if (confirm('重置三关进度并清除段位？')) GameState.reset();
    });

    // 关卡卡按下音效
    document.querySelectorAll('.boss-card').forEach(c => {
      c.addEventListener('click', () => SFX.flip());
    });
  </script>
</body>
</html>
